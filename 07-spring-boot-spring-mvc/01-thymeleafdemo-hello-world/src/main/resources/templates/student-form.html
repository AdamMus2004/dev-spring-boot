<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>
<h3>Student Registration Form</h3>
<br><br>

<form th:action="@{/processStudentForm}" th:object="${student}" method="post">
    First name: <input type="text" th:field="${student.firstName}">
    <br><br>
    Last name: <input type="text" th:field="${student.lastName}">
    <br><br>
    Country:
    <select type="text" th:field="${student.country}">
        <option th:each="tempCountry : ${countries}" th:value="${tempCountry}" th:text="${tempCountry}"/>
    </select>
    <br><br>
    Favourite Programming Language:
    <input type="radio" th:field="${student.favouriteLanguage}"
                        th:each="tempLanguage : ${programmingLanguages}"
                        th:value="${tempLanguage}"
                        th:text="${tempLanguage}"/>

    <br><br>
    Favourite Operating Systems:
    <input type="checkbox"
           th:field="${student.favouriteSystem}"
           th:each="sysTmp :${systems}"
           th:value="${sysTmp}"
           th:text="${sysTmp}"/>
    <br><br>
    <input type="submit" value="Submit"/>

</form>

</body>
</html>
