<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>
<h3>Student Registration Form</h3>
<br><br>

<form th:action="@{/processStudentForm}" th:object="${student}" method="post">
    First name: <input type="text" th:field="${student.firstName}">
    <br><br>
    Last name: <input type="text" th:field="${student.lastName}">
    <br><br>
    Country:
    <select type="text" th:field="${student.country}">
        <option th:value="Brazil">Brazil</option>
        <option th:value="Poland">Poland</option>
        <option th:value="Germany">Germany</option>
        <option th:value="USA">USA</option>
    </select>
    <br><br>
    <input type="submit" value="Submit"/>

</form>

</body>
</html>
