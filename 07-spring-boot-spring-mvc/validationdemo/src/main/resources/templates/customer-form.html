<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration Form</title>
    <style>
        .error{color: red}
    </style>
</head>
<body>
<i>Fill out the form. Asterisk (*) means required</i>
<br><br>
<form th:action="@{/processForm}" th:object="${customer}" method="post">

    First name: <input type="text" th:field="${customer.firstName}"/>

    <br><br>

    Last name (*): <input type="password" th:field="${customer.lastName}"/>
    <span th:if="${#fields.hasErrors('lastName')}"
          th:errors="*{lastName}"
          class="error"></span>

    <br><br>
    Free passes(0-10): <input type="number" th:field="${customer.freePasses}"/>
    <span th:if="${#fields.hasErrors('freePasses')}"
          th:errors="*{freePasses}"
          class="error"></span>
    <br><br>
    Postal Code: <input type="text" th:field="${customer.postalCode}"/>
    <span th:if="${#fields.hasErrors('postalCode')}"
          th:errors="${customer.postalCode}"
          class="error"></span>
    <br><br>
    <input type="submit" value="Submit"/>

</form>


<br><br>


</body>
</html>
